      <section id="sources" class="section route-page" data-page="sources">
        <div class="section-head">
          <p class="eyebrow">Source ledger</p>

          <p>Search the public source registry, inspect URL-backed records, and isolate entries still awaiting stronger verification. No raw-data download controls are exposed on this page.</p>
          <div id="sourceAuditCards" class="source-audit-cards" aria-label="Source ledger health"></div>

          <span id="sourceSummary" class="source-summary" aria-live="polite"></span>
