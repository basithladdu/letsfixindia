<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">LetsFixIndia — India's sourced public record</title>
  <desc id="description">LetsFixIndia branding with the Indian national flag colours and Ashoka Chakra.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f4f0e7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#171717" flood-opacity=".16"/>
    </filter>
    <clipPath id="flagClip">
      <rect width="330" height="220" rx="22"/>
    </clipPath>
    <line id="spoke" x1="0" y1="-30" x2="0" y2="-7"/>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="18" fill="#ff671f"/>
  <rect y="612" width="1200" height="18" fill="#046a38"/>
  <path d="M0 18h420L290 612H0Z" fill="#ff671f" opacity=".045"/>
  <path d="M1200 18H870l110 594h220Z" fill="#046a38" opacity=".055"/>

  <g transform="translate(78 84)">
    <text x="0" y="0" dominant-baseline="hanging" fill="#06038d" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="3">INDIA'S PUBLIC EVIDENCE ARCHIVE</text>
    <text x="0" y="66" dominant-baseline="hanging" fill="#171717" font-family="Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-3">LetsFixIndia</text>
    <rect y="166" width="116" height="8" rx="4" fill="#ff671f"/>
    <rect x="126" y="166" width="62" height="8" rx="4" fill="#06038d"/>
    <rect x="198" y="166" width="116" height="8" rx="4" fill="#046a38"/>

    <text x="0" y="216" dominant-baseline="hanging" fill="#30343a" font-family="Arial, sans-serif" font-size="34" font-weight="700">A sourced public record of India</text>
    <text x="0" y="271" dominant-baseline="hanging" fill="#59616a" font-family="Arial, sans-serif" font-size="22">Governance · Rights · Protests · Institutions</text>

    <g transform="translate(0 354)">
      <rect width="214" height="62" rx="12" fill="#171717"/>
      <text x="107" y="31" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="1">2014—2026</text>
      <rect x="230" width="218" height="62" rx="12" fill="#fff" stroke="#d9d5ca" stroke-width="2"/>
      <text x="339" y="31" dominant-baseline="middle" text-anchor="middle" fill="#30343a" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1">LETSFIXINDIA.COM</text>
    </g>
  </g>

  <g transform="translate(790 118)" filter="url(#shadow)">
    <g clip-path="url(#flagClip)">
      <rect width="330" height="220" fill="#ffffff"/>
      <rect width="330" height="73.34" fill="#ff671f"/>
      <rect y="146.66" width="330" height="73.34" fill="#046a38"/>
    </g>
    <rect width="330" height="220" rx="22" fill="none" stroke="#171717" stroke-width="3"/>
    <g transform="translate(165 110)" fill="none" stroke="#06038d" stroke-width="2.4" stroke-linecap="round">
      <circle r="31"/>
      <circle r="4" fill="#06038d" stroke="none"/>
      <use href="#spoke" transform="rotate(0)"/>
      <use href="#spoke" transform="rotate(15)"/>
      <use href="#spoke" transform="rotate(30)"/>
      <use href="#spoke" transform="rotate(45)"/>
      <use href="#spoke" transform="rotate(60)"/>
      <use href="#spoke" transform="rotate(75)"/>
      <use href="#spoke" transform="rotate(90)"/>
      <use href="#spoke" transform="rotate(105)"/>
      <use href="#spoke" transform="rotate(120)"/>
      <use href="#spoke" transform="rotate(135)"/>
      <use href="#spoke" transform="rotate(150)"/>
      <use href="#spoke" transform="rotate(165)"/>
      <use href="#spoke" transform="rotate(180)"/>
      <use href="#spoke" transform="rotate(195)"/>
      <use href="#spoke" transform="rotate(210)"/>
      <use href="#spoke" transform="rotate(225)"/>
      <use href="#spoke" transform="rotate(240)"/>
      <use href="#spoke" transform="rotate(255)"/>
      <use href="#spoke" transform="rotate(270)"/>
      <use href="#spoke" transform="rotate(285)"/>
      <use href="#spoke" transform="rotate(300)"/>
      <use href="#spoke" transform="rotate(315)"/>
      <use href="#spoke" transform="rotate(330)"/>
      <use href="#spoke" transform="rotate(345)"/>
    </g>
  </g>

  <g transform="translate(824 390)">
    <circle cx="14" cy="14" r="14" fill="#06038d"/>
    <circle cx="14" cy="14" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="42" y="14" dominant-baseline="middle" fill="#30343a" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing=".5">TIMELINE · STATES · GALLERY</text>
    <text x="0" y="62" dominant-baseline="hanging" fill="#59616a" font-family="Arial, sans-serif" font-size="19">Evidence status and linked sources</text>
    <text x="0" y="99" dominant-baseline="hanging" fill="#59616a" font-family="Arial, sans-serif" font-size="19">for every published record.</text>
  </g>
</svg>
